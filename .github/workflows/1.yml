name: workflow_dispatch 

on: 
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        type: choice
        options:
          - staging
          - production
      debug:
        description: "Enable debug mode"
        required: true
        type: boolean
        default: false
    
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Test Job"
  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy to ${{ inputs.environment }}
        run: echo "Deploying to ${{ inputs.environment }}"
        

    
